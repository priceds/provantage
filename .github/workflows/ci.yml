name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ProVantage.slnx

      - name: Build
        run: dotnet build ProVantage.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test ProVantage.slnx --no-build --configuration Release --verbosity normal

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/provantage-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/provantage-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npx ng build --configuration production
